name: CI

on:
  push:
    branches:
      - main
      - production-saas-rebuild
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify auth flow
        run: npm run verify:auth-flow

      - name: Verify baseline
        run: npm run verify:baseline
